<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 점심 운세</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: #ffffff;
            padding: 20px 15px;
            overflow-x: hidden;
        }

        .container {
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
        }

        /* 헤더 */
        .header {
            text-align: center;
            margin-bottom: 30px;
            animation: fadeInDown 0.8s ease;
        }

        .header h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            font-weight: 900;
        }

        .header .subtitle {
            font-size: 0.95rem;
            color: #666;
            letter-spacing: 0.5px;
        }

        /* 실시간 통계 배너 */
        .stats-banner {
            background: linear-gradient(135deg, #667eea15, #764ba215);
            border-radius: 30px;
            padding: 12px 20px;
            margin: 20px auto;
            width: fit-content;
            display: flex;
            gap: 20px;
            align-items: center;
            border: 1px solid #667eea30;
            animation: pulse 2s infinite;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #333;
            font-weight: 700;
            font-size: 0.85rem;
        }

        .stat-number {
            font-size: 1.1rem;
            color: #667eea;
        }

        /* 메뉴 카드 그리드 */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .menu-card {
            background: #ffffff;
            border-radius: 15px;
            padding: 20px 15px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            border: 2px solid #f0f0f0;
            animation: fadeInUp 0.6s ease backwards;
        }

        .menu-card:nth-child(1) { animation-delay: 0.1s; }
        .menu-card:nth-child(2) { animation-delay: 0.15s; }
        .menu-card:nth-child(3) { animation-delay: 0.2s; }
        .menu-card:nth-child(4) { animation-delay: 0.25s; }
        .menu-card:nth-child(5) { animation-delay: 0.3s; }
        .menu-card:nth-child(6) { animation-delay: 0.35s; }
        .menu-card:nth-child(7) { animation-delay: 0.4s; }
        .menu-card:nth-child(8) { animation-delay: 0.45s; }
        .menu-card:nth-child(9) { animation-delay: 0.5s; }

        .menu-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(102,126,234,0.1), transparent);
            transform: rotate(45deg);
            transition: 0.6s;
        }

        .menu-card:hover::before {
            left: 100%;
        }

        .menu-card:hover {
            transform: translateY(-8px) scale(1.03);
            box-shadow: 0 15px 35px rgba(102,126,234,0.15);
            border-color: #667eea;
        }

        .menu-card.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            transform: scale(1.05);
        }

        .menu-icon {
            font-size: 2.8rem;
            margin-bottom: 10px;
            display: block;
            filter: drop-shadow(0 3px 6px rgba(0,0,0,0.1));
        }

        .menu-name {
            font-size: 1.05rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .menu-description {
            font-size: 0.75rem;
            color: #999;
            line-height: 1.3;
        }

        .menu-card.selected .menu-description {
            color: rgba(255,255,255,0.85);
        }

        /* 로딩 화면 */
        .loading-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.98);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .loading-screen.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        .crystal-ball {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fff, #667eea, #764ba2);
            box-shadow: 
                0 0 40px rgba(102, 126, 234, 0.6),
                inset 0 0 40px rgba(255,255,255,0.3);
            animation: float 3s ease-in-out infinite, glow 2s ease-in-out infinite;
            position: relative;
        }

        .crystal-ball::before {
            content: '';
            position: absolute;
            top: 20%;
            left: 20%;
            width: 40%;
            height: 40%;
            background: radial-gradient(circle, rgba(255,255,255,0.8), transparent);
            border-radius: 50%;
            filter: blur(8px);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 40px rgba(102, 126, 234, 0.6); }
            50% { box-shadow: 0 0 60px rgba(102, 126, 234, 0.9); }
        }

        .loading-text {
            color: #333;
            font-size: 1.1rem;
            margin-top: 25px;
            font-weight: 700;
            letter-spacing: 2px;
            animation: pulse 1.5s infinite;
        }

        .loading-dots {
            color: #667eea;
            font-size: 1.5rem;
            letter-spacing: 3px;
        }

        /* 결과 화면 */
        .result-screen {
            display: none;
            background: white;
            border-radius: 20px;
            padding: 30px 25px;
            max-width: 550px;
            margin: 0 auto;
            box-shadow: 0 10px 40px rgba(102,126,234,0.1);
            border: 2px solid #f0f0f0;
            animation: scaleIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .result-screen.active {
            display: block;
        }

        .result-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .result-menu {
            font-size: 3.5rem;
            margin-bottom: 15px;
            animation: bounce 1s ease;
        }

        .result-title {
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 8px;
            font-weight: 900;
        }

        .result-subtitle {
            color: #666;
            font-size: 0.95rem;
        }

        /* 운세 게이지 */
        .fortune-gauge {
            margin: 30px 0;
        }

        .gauge-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .gauge-percentage {
            color: #667eea;
            font-size: 1.6rem;
        }

        .gauge-bar-container {
            height: 35px;
            background: #f5f5f5;
            border-radius: 18px;
            overflow: hidden;
            position: relative;
        }

        .gauge-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2, #FFD700);
            border-radius: 18px;
            transition: width 2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .gauge-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
            animation: shine 2s infinite;
        }

        @keyframes shine {
            to { left: 100%; }
        }

        /* 운세 상세 정보 */
        .fortune-details {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 15px;
            padding: 25px;
            margin: 25px 0;
        }

        .detail-item {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 2px dashed rgba(0,0,0,0.08);
        }

        .detail-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .detail-label {
            font-weight: 700;
            color: #667eea;
            margin-bottom: 8px;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .detail-content {
            color: #333;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        /* 다시하기 버튼 */
        .retry-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            margin-top: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .retry-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102,126,234,0.3);
        }

        /* 애니메이션 */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.7);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-20px); }
            60% { transform: translateY(-10px); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* 반응형 */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.5rem;
            }

            .menu-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
            }

            .menu-card {
                padding: 15px 10px;
            }

            .menu-icon {
                font-size: 2.2rem;
            }

            .menu-name {
                font-size: 0.9rem;
            }

            .menu-description {
                font-size: 0.7rem;
            }

            .stats-banner {
                flex-direction: column;
                gap: 8px;
                padding: 12px 18px;
            }

            .result-screen {
                padding: 25px 20px;
            }

            .result-menu {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>

    <script>
        // 실시간 사용자 수 랜덤 증가
        function updateLiveUsers() {
            const usersElement = document.getElementById('liveUsers');
            let currentUsers = parseInt(usersElement.textContent.replace(',', ''));
            setInterval(() => {
                currentUsers += Math.floor(Math.random() * 10) + 1;
                usersElement.textContent = currentUsers.toLocaleString();
            }, 3000);
        }
        updateLiveUsers();

        // 카운트다운 타이머
        function updateCountdown() {
            const countdownElement = document.getElementById('countdown');
            function tick() {
                const now = new Date();
                const midnight = new Date(now);
                midnight.setHours(24, 0, 0, 0);
                const diff = midnight - now;
                
                const hours = Math.floor(diff / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);
                
                countdownElement.textContent = 
                    `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            }
            tick();
            setInterval(tick, 1000);
        }

        // 결과 표시 (랜덤 선택)

            const menuInfo = menuData[menuType];
            const randomResult = menuInfo.results[Math.floor(Math.random() * menuInfo.results.length)];
            
            document.getElementById('menuSelection').style.display = 'none';
            document.getElementById('loadingScreen').classList.remove('active');
            document.getElementById('resultScreen').classList.add('active');
            
            document.getElementById('resultIcon').textContent = menuInfo.icon;
            document.getElementById('resultTitle').textContent = menuInfo.title;
            document.getElementById('resultSubtitle').textContent = randomResult.subtitle;
            document.getElementById('fortunePercent').textContent = randomResult.fortune + '%';
            document.getElementById('todayMessage').textContent = randomResult.message;
            document.getElementById('luckyItem').textContent = randomResult.luckyItem;
            document.getElementById('recommendAction').textContent = randomResult.action;

                document.getElementById('gaugeBar').style.width = randomResult.fortune + '%';
            }, 300);
        }
